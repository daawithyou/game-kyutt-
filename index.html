<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tap Kotaknya!</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      background: #1e293b;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 18px;
    }

    #gameArea {
      position: relative;
      width: 100%;
      height: 420px;
      background: linear-gradient(180deg, #1d4ed8, #0ea5e9);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    #target {
      position: absolute;
      width: 70px;
      height: 70px;
      background: #facc15;
      border-radius: 16px;
      display: none;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
      touch-action: manipulation;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      background: #22c55e;
      color: white;
    }

    .small {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tap Kotaknya!</h1>

    <div class="info">
      <div>Skor: <span id="score">0</span></div>
      <div>Waktu: <span id="time">20</span>d</div>
    </div>

    <div id="gameArea">
      <div id="target"></div>
    </div>

    <button id="startBtn">Mulai Game</button>
    <p class="small">Sentuh kotak kuning sebanyak mungkin dalam 20 detik.</p>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const target = document.getElementById("target");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const startBtn = document.getElementById("startBtn");

    let score = 0;
    let timeLeft = 20;
    let timer = null;
    let playing = false;

    function moveTarget() {
      const areaWidth = gameArea.clientWidth;
      const areaHeight = gameArea.clientHeight;
      const targetSize = target.offsetWidth;

      const maxX = areaWidth - targetSize;
      const maxY = areaHeight - targetSize;

      const x = Math.floor(Math.random() * maxX);
      const y = Math.floor(Math.random() * maxY);

      target.style.left = x + "px";
      target.style.top = y + "px";
    }

    function startGame() {
      score = 0;
      timeLeft = 20;
      playing = true;

      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      target.style.display = "block";
      moveTarget();

      startBtn.disabled = true;
      startBtn.textContent = "Game Berjalan...";

      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      playing = false;
      clearInterval(timer);
      target.style.display = "none";
      startBtn.disabled = false;
      startBtn.textContent = "Main Lagi";
      alert("Waktu habis! Skor kamu: " + score);
    }

    target.addEventListener("pointerdown", () => {
      if (!playing) return;
      score++;
      scoreEl.textContent = score;
      moveTarget();
    });

    startBtn.addEventListener("click", startGame);

    window.addEventListener("resize", () => {
      if (playing) moveTarget();
    });
  </script>
</body>
</html>
